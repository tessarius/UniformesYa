<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>UniformesYA — Prototipo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #080F1E;
      color: #E8EEFF;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1C3050; border-radius: 4px; }

    /* Fabric.js canvas cursor */
    .canvas-container { cursor: default !important; }
    .upper-canvas { cursor: default !important; }

    /* Input reset */
    input, textarea, button { font-family: 'DM Sans', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Selection */
    ::selection { background: rgba(29,107,255,0.3); }

    /* Fabric canvas bg transparent fix */
    .canvas-container canvas { background: transparent !important; }

    /* Touch optimization */
    button, [role=button] { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    /* Smooth transitions */
    * { -webkit-overflow-scrolling: touch; }

    /* text-wrap */
    p, h1, h2, h3, h4 { text-wrap: pretty; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/screens-1-2.jsx"></script>
  <script type="text/babel" src="components/editor.jsx"></script>
  <script type="text/babel" src="components/quote.jsx"></script>
  <script type="text/babel" src="components/admin.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
